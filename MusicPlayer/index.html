<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <img src="images/image1.jpg" id="cover" alt="Cover">

    <h2 id="title">Song 1</h2>
    <h4 id="artist">Artist 1</h4>

    <audio id="audio"></audio>

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
    >

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="volume">
        🔊
        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1"
        >
    </div>

    <h3>Playlist</h3>

    <ul id="playlist">
        <li onclick="playSong(0)">🎵 Song 1</li>
        <li onclick="playSong(1)">🎵 Song 2</li>
        <li onclick="playSong(2)">🎵 Song 3</li>
    </ul>

</div>

<script src="script.js"></script>

</body>
</html>
