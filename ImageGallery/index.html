<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="https://picsum.photos/id/1015/600/400" alt="Nature">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1011/600/400" alt="City">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/id/1016/600/400" alt="Nature">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1031/600/400" alt="City">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/id/1043/600/400" alt="Nature">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1040/600/400" alt="City">
    </div>

</div>

<!-- Lightbox -->

<div id="lightbox">

    <span id="close">&times;</span>

    <button id="prev">&#10094;</button>

    <img id="lightbox-img">

    <button id="next">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
